<!DOCTYPE html>

<html>
<head>
    <title>Customer Churn Prediction</title>

```
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;
        padding: 30px;
    }

    .container {
        width: 700px;
        margin: auto;
        background: white;
        padding: 25px;
        border-radius: 10px;
        box-shadow: 0px 0px 10px gray;
    }

    h1 {
        text-align: center;
    }

    label {
        font-weight: bold;
    }

    input, select {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
        margin-bottom: 15px;
    }

    button {
        padding: 12px 20px;
        background: #007BFF;
        color: white;
        border: none;
        cursor: pointer;
    }

    button:hover {
        background: #0056b3;
    }

    .result {
        margin-top: 20px;
        font-size: 20px;
        font-weight: bold;
        text-align: center;
    }
</style>
```

</head>

<body>

<div class="container">

```
<h1>Customer Churn Prediction System</h1>

<form method="POST">

    <label>Gender</label>
    <select name="gender">
        <option>Male</option>
        <option>Female</option>
    </select>

    <label>Senior Citizen</label>
    <select name="SeniorCitizen">
        <option value="0">No</option>
        <option value="1">Yes</option>
    </select>

    <label>Partner</label>
    <select name="Partner">
        <option>No</option>
        <option>Yes</option>
    </select>

    <label>Dependents</label>
    <select name="Dependents">
        <option>No</option>
        <option>Yes</option>
    </select>

    <label>Tenure (Months)</label>
    <input type="number" name="tenure" required>

    <label>Monthly Charges</label>
    <input type="number" step="0.01" name="MonthlyCharges" required>

    <label>Total Charges</label>
    <input type="number" step="0.01" name="TotalCharges" required>

    <button type="submit">Predict Churn</button>

</form>
{% if prediction_text %}
<div class="result">
    {{ prediction_text }}
</div>
{% endif %}

</div>

</body>
</html>
